algo: stable_baselines3.PPO
kwargs:
  policy: stable_baselines3.common.policies.ActorCriticPolicy
  device: cuda
  batch_size: 1024
  n_steps: 2048
  learning_rate: 3.0e-04
  ent_coef: 3.0e-03
  clip_range: 0.2
  clip_range_vf: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  vf_coef: 0.5
  n_epochs: 5
  use_sde: null
  sde_sample_freq: -1
  seed: 0
  policy_kwargs:
    activation_fn: Tanh
    net_arch:
      pi: [256, 256, 256, 256]
      vf: [256, 256, 256, 256]
